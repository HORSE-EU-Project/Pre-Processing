version: "3"

networks:
  dff-network:
  
services:
  dff-app-keycloak:
    build:
      dockerfile: Dockerfile
      context: .
    image: dff-app-keycloak:latest
    container_name: "dff-app-keycloak"
    networks: 
      - dff-network
    environment:
      - "KEYCLOAK_CLIENT_SECRET=$KEYCLOAK_SECRET"
      - "SECRET_KEY=$APP_SECRET_KEY"
    ports:
      - 5005:5005
    volumes:
      - sqlite_data_v2:/dff/sqlite_data

  dff-api-keycloak:
    build:
      dockerfile: Dockerfile.api
      context: .
    image: dff-api-keycloak:latest
    container_name: "dff-api-keycloak"
    environment:
      - "SQLITE_DB_URL=$SQLITE_URL"
      #- "MYSQL_PASS=$MYSQL_DB_PASS"
      - "MONGO_DB_PASS=$MONGO_PASS"
      - "KEYCLOAK_CLIENT_SECRET=$KEYCLOAK_SECRET"
    ports:
      - 5007:5007
    networks: 
      - dff-network
    depends_on:
      - dff-app-keycloak
    volumes:
      - sqlite_data_v2:/sqlite_data

volumes:
  sqlite_data_v2:
  postgres-data: