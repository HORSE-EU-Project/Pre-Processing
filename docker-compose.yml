version: "3.8"
services:
  app:
    build: .
    container_name: pre-processing
    environment:
      - ES_USERNAME=${ES_USERNAME}
      - ES_PASSWORD=${ES_PASSWORD}
      - ES_INDEX=${ES_INDEX}
      - ES_DATA_START_TIME=${ES_DATA_START_TIME}
      - ES_DATA_END_TIME=${ES_DATA_END_TIME}
      - ES_URL=${ES_URL}
      - POLLING_INTERVAL=${POLLING_INTERVAL}
      - AFTER_PRE_PROCESSING_URL=${AFTER_PRE_PROCESSING_URL}
      - LIVE_DATA=${LIVE_DATA}
      - CONFIG_FILE=${CONFIG_FILE}
      - ES_ANALYTICS_INDEX=${ES_ANALYTICS_INDEX}
      - TRANSFORMATION_TYPE=${TRANSFORMATION_TYPE}
    ports:
      - "5001:5000"
    restart: always
    volumes:
      - ./app:/app

