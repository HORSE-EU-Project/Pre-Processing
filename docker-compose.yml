version: "3"


  
services:
  dff-app-keycloak:
    build:
      dockerfile: Dockerfile
      context: .
    image: dff-app-keycloak:latest
    container_name: "dff-app-keycloak"
    networks: 
      - dff-network
    args:
        - DATABASE_URL=${DATABASE_URL}
        - API_KEY=${API_KEY}
        - SECRET_KEY=${SECRET_KEY}
        - DB_HOST=${DB_HOST}
        - DB_USER=${DB_USER}
        - DB_PASSWORD=${DB_PASSWORD}
        - DB_NAME=${DB_NAME}
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    ports:
      - 5005:5005
    volumes:
      - sqlite_data_v2:/dff/sqlite_data
      - .:/dff

