version: "3"

networks:
  dff-network:
  
services:
  dff-app:
    build:
      dockerfile: Dockerfile
      context: .
    image: dff-app:latest
    container_name: "dff-app-keycloak"
    networks: 
      - dff-network
    ports:
      - 5000:5000
    volumes:
      - sqlite_data:/dff/sqlite_data

  dff-login:
    build:
      dockerfile: Dockerfile.loginapi
      context: .
    image: dff-login:latest
    container_name: "dff-login-keycloak"
    environment: 
      - "KEYCLOAK_CLIENT_SECRET=$KEYCLOAK_SECRET"
    networks: 
      - dff-network
    ports:
      - 5001:5001
    depends_on:
      - dff-app
    volumes:
      - sqlite_data:/sqlite_data

  dff-api:
    build:
      dockerfile: Dockerfile.api
      context: .
    image: dff-api:latest
    container_name: "dff-api-keycloak"
    environment:
      - "SQLITE_DB_URL=$SQLITE_URL"
      - "MYSQL_PASS=$MYSQL_DB_PASS"
      - "MONGO_DB_PASS=$MONGO_PASS"
    ports:
      - 5003:5003
    networks: 
      - dff-network
    depends_on:
      - dff-login
      - dff-app
    volumes:
      - sqlite_data:/sqlite_data

volumes:
  sqlite_data: