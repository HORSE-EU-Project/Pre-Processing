version: "3"

networks:
  dff-network:
  
services:
  kc-postgres:
    image: postgres
    container_name: "kc-postgres"
    restart: unless-stopped
    environment:
      - "POSTGRES_DB=keycloak"
      - "POSTGRES_USER=$POSTGRES_DB_USER"
      - "POSTGRES_PASSWORD=$POSTGRES_DB_PASS"
    networks: 
      - dff-network
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  keycloak:
    image: jboss/keycloak
    container_name: "keycloak"
    restart: unless-stopped
    environment:
      - "DB_USER=$POSTGRES_DB_USER"
      - "DB_PASSWORD=$POSTGRES_DB_PASS"
      - "DB_VENDOR=POSTGRES"
      - "DB_ADDR=kc-postgres"
      - "DB_DATABASE=keycloak"
      - "KEYCLOAK_USER=$KC_USER"
      - "KEYCLOAK_PASSWORD=$KC_PASS"
      - "PROXY_ADDRESS_FORWARDING=true"
    networks: 
      - dff-network
    ports:
      - 8080:8080
    depends_on:
      - kc-postgres

  dff-app-keycloak:
    build:
      dockerfile: Dockerfile
      context: .
    image: dff-app-keycloak:latest
    container_name: "dff-app-keycloak"
    networks: 
      - dff-network
    environment:
      - PYTHONUNBUFFERED=1
      - "KEYCLOAK_CLIENT_SECRET=$KEYCLOAK_SECRET"
    ports:
      - 5005:5005
    volumes:
      - sqlite_data_v2:/dff/sqlite_data
    depends_on:
      - keycloak

  dff-login-keycloak:
    build:
      dockerfile: Dockerfile.loginapi
      context: .
    image: dff-login-keycloak:latest
    container_name: "dff-login-keycloak"
    environment: 
      - "KEYCLOAK_CLIENT_SECRET=$KEYCLOAK_SECRET"
      - PYTHONUNBUFFERED=1
    networks: 
      - dff-network
    ports:
      - 5006:5006
    depends_on:
      - dff-app-keycloak
      - keycloak
    volumes:
      - sqlite_data_v2:/sqlite_data

  dff-api-keycloak:
    build:
      dockerfile: Dockerfile.api
      context: .
    image: dff-api-keycloak:latest
    container_name: "dff-api-keycloak"
    environment:
      - "SQLITE_DB_URL=$SQLITE_URL"
      - "MYSQL_PASS=$MYSQL_DB_PASS"
      - "MONGO_DB_PASS=$MONGO_PASS"
      - "KEYCLOAK_CLIENT_SECRET=$KEYCLOAK_SECRET"
      - PYTHONUNBUFFERED=1
    ports:
      - 5007:5007
    networks: 
      - dff-network
    depends_on:
      - dff-login-keycloak
      - dff-app-keycloak
      - keycloak
    volumes:
      - sqlite_data_v2:/sqlite_data

volumes:
  sqlite_data_v2:
  postgres-data: