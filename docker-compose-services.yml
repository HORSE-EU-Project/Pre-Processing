version: "3.5"



services:
  # Postgres is Keycloak's db
  kc-postgres:
    image: postgres:14.2
    command: postgres -c 'max_connections=200'
    container_name: "kc-postgres"
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    healthcheck:
      test: "exit 0"
    ports:
      - "5432:5432"
    networks:
      - dff-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Keycloak is the identity and access manager
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    command: start-dev
    container_name: "keycloak"
    restart: unless-stopped
    volumes:
      - ./profile.properties:/opt/jboss/keycloak/standalone/configuration/profile.properties
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://kc-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      kc-postgres:
        condition: service_healthy
    networks:
      - dff-network

  # Elasticsearch as the search and analytics engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.0
    container_name: "elasticsearch"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Only for development, disable for production
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - dff-network
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # New service for Elasticsearch alerts
  es_alerts:
    build:
      context: .
      dockerfile: Dockerfile.ES_alerts
    container_name: "es_alerts"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - dff-network
    volumes:
      - .:/dff

  orion:
    image: fiware/orion
    container_name: "orion"
    depends_on:
      mongo:
        condition: service_healthy
    command: -dbhost mongo -logLevel DEBUG
    ports:
      - "1026:1026"
    networks:
      - dff-network

  mongo:
    image: mongo:4.2
    container_name: "mongo"
    command: --nojournal
    networks:
      - dff-network
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  mongo-data: ~
  postgres-data: ~
  profile.properties: ~
  es-data: ~

networks:
  dff-network: