version: "3.5"

services:
  #postgres is Keycloak's db
  kc-postgres:
    image: postgres:14.2
    command: postgres -c 'max_connections=200'
    container_name: "kc-postgres"
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    healthcheck:
      test: "exit 0"
    ports:
      - "5432:5432"
    networks:
      - dff-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  #Keycloak is the identity and access manager
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    command: start-dev
    container_name: "keycloak"
    restart: unless-stopped
    volumes:
      - ./profile.properties:/opt/jboss/keycloak/standalone/configuration/profile.properties
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://kc-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

    ports:
      - 8080:8080
    depends_on:
      kc-postgres:
        condition: service_healthy
    networks:
      - dff-network

  orion:
    image: fiware/orion
    container_name: "orion"
    depends_on:
      mongo:
        condition: service_healthy
    command: -dbhost mongo -logLevel DEBUG
    ports:
      - "1026:1026"
    networks:
      - dff-network

  mongo:
    image: mongo:4.2
    container_name: "mongo"
    command: --nojournal
    networks:
      - dff-network
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  mongo-data: ~
  postgres-data: ~
  profile.properties: ~


networks:
  dff-network:
