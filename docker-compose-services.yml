version: "3.5"



services:
  # Postgres is Keycloak's db
  kc-postgres:
    image: postgres:14.2
    command: postgres -c 'max_connections=200'
    container_name: "kc-postgres"
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: "exit 0"
    ports:
      - "5432:5432"
    networks:
      - dff-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Keycloak is the identity and access manager
  keycloak:
    image: ${KEYCLOAK_IMAGE}
    command: start-dev
    container_name: "keycloak"
    restart: unless-stopped
    volumes:
      - ./profile.properties:/opt/jboss/keycloak/standalone/configuration/profile.properties
    environment:
      KC_DB: postgres
      KC_DB_URL: ${KEYCLOAK_DB_URL}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      kc-postgres:
        condition: service_healthy
    networks:
      - dff-network

  # Elasticsearch as the search and analytics engine
  elasticsearch:
    image: ${ELASTICSEARCH_IMAGE}
    container_name: "elasticsearch"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Only for development, disable for production
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - dff-network
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  orion:
    image: ${FIWARE_ORION_IMAGE}
    container_name: "orion"
    depends_on:
      mongo:
        condition: service_healthy
    command: -dbhost mongo -logLevel DEBUG
    ports:
      - "1026:1026"
    networks:
      - dff-network

  mongo:
    image: ${MONGO_IMAGE}
    container_name: "mongo"
    command: --nojournal
    networks:
      - dff-network
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  mongo-data: ~
  postgres-data: ~
  profile.properties: ~
  es-data: ~

networks:
  dff-network: