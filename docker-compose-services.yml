version: "3.5"

services:
  #postgres is Keycloak's db
  kc-postgres:
    image: postgres
    container_name: "kc-postgres"
    restart: unless-stopped
    environment:
      - "POSTGRES_DB=keycloak"
      - "POSTGRES_USER=$POSTGRES_DB_USER"
      - "POSTGRES_PASSWORD=$POSTGRES_DB_PASS"
    networks: 
      - dff-network
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  #Keycloak is the identity and access manager
  keycloak:
    image: jboss/keycloak
    container_name: "keycloak"
    restart: unless-stopped
    volumes:
      - ./profile.properties:/opt/jboss/keycloak/standalone/configuration/profile.properties
    environment:
      - "DB_USER=$POSTGRES_DB_USER"
      - "DB_PASSWORD=$POSTGRES_DB_PASS"
      - "DB_VENDOR=POSTGRES"
      - "DB_ADDR=kc-postgres"
      - "DB_DATABASE=keycloak"
      - "KEYCLOAK_USER=$KC_USER"
      - "KEYCLOAK_PASSWORD=$KC_PASS"
      - "PROXY_ADDRESS_FORWARDING=true"
    networks: 
      - dff-network
    ports:
      - 8080:8080
    depends_on:
      - kc-postgres

volumes:
  postgres-data:   profile.properties: 
networks:
  dff-network: