<form method=post action="/consumer">
    <div class="text-center">
        <ul class="list-group list-group-flush">
            <li class="list-group-item">
            <!-- Default checked -->
            <div class="custom-control custom-checkbox">
                <input type="checkbox" class="custom-control-input" name=fr id="fr">
                <label class="custom-control-label" for="check1">Fr Sensors platform</label>
            </div>
            </li>
            <li class="list-group-item">
            <!-- Default checked -->
            <div class="custom-control custom-checkbox">
                <input type="checkbox" class="custom-control-input" name=xb id="xb">
                <label class="custom-control-label" for="check2">XBELLO</label>
            </div>
            </li>
            <li class="list-group-item">
            <!-- Default checked -->
            <div class="custom-control custom-checkbox">
                <input type="checkbox" class="custom-control-input" name=tr id="tr">
                <label class="custom-control-label" for="check3">Triage platform</label>
            </div>
            </li>
            <li class="list-group-item">
            <!-- Default checked -->
            <div class="custom-control custom-checkbox">
                <input type="checkbox" class="custom-control-input" name=ai id="ai">
                <label class="custom-control-label" for="check4">AirflowMCC</label>
            </div>
            </li>
            <li class="list-group-item">
            <!-- Default checked -->
            <div class="custom-control custom-checkbox">
                <input type="checkbox" class="custom-control-input" name=si id="si">
                <label class="custom-control-label" for="check5">Sivi</label>
            </div>
            </li>
        </ul>
        <button type="submit" class="btn btn-primary">Submit</button>
    </div>
    
</form>

{% endblock %}
