<!doctype html>
<html lang="en">
    <head>
        <style>
            .alert-danger {
                text-align: center;
            }
        </style>
        <style>
            div.fixed {
              position: fixed;
              width: 70%;
              bottom: 10px;
            }
        </style>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Varela+Round">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
    </head>

        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <a href="#"><img src="../static/logo.png" style="object-fit:cover; height:50px;"></a> 
        	<button type="button" class="navbar-toggler" data-toggle="collapse" data-target="#navbarCollapse">
        		<span class="navbar-toggler-icon"></span>
        	</button>
        	<!-- Collection of nav links, forms, and other content for toggling -->
        	<div id="navbarCollapse" class="collapse navbar-collapse justify-content-start" style="font-weight: 600; font-size: 18px;">
        		<div class="navbar-nav">
        			<a href="/" class="nav-item nav-link">Home</a>
        			<a href="#" class="nav-item nav-link">About</a>
        			<a href="#" class="nav-item nav-link">Contact</a>
                </div>
        	</div>
        </nav>
          
       
        {% for message in get_flashed_messages(with_categories=True) %}
            {% if message[0] == "error" %}
            <div class="alert alert-danger alert-dismissible" role="alert">
                <button type="button" class="close" data-dismiss="alert" aria-label="Close" ><span aria-hidden="true">&times;</span></button>
                <!-- <strong>Title</strong> --> {{ message[1] }}
            </div>
            {% elif message[0] == "success" %}
            <div class="alert alert-success alert-dismissible" role="alert">
                <button type="button" class="close" data-dismiss="alert" aria-label="Close" ><span aria-hidden="true">&times;</span></button>
                <!-- <strong>Title</strong> --> {{ message[1] }}
            </div>
            {% elif message[0] == "info" %}
            <div class="alert alert-info alert-dismissible" role="alert">
                <button type="button" class="close" data-dismiss="alert" aria-label="Close" ><span aria-hidden="true">&times;</span></button>
                <!-- <strong>Title</strong> --> {{ message[1] }}
            </div>
            {%endif%}
        {% endfor %}
        {% block content %} {% endblock %}
    
    </body>
</html>
