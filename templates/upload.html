{% extends "base.html" %}
{% block title %} Oauth2 IDM Demo. {% endblock %}

{% block content %}

<p><h1 style="color:green;text-align:center;">Hello, {{name}}! You're logged in! Email: {{email}}</h1></p>

<p><h3 style="color: green;text-align:center;">Upload a JSON file</h2></p>

<div class="row margin-bottom-10 d-grid gap-3">
    <div class="text-center">
        <form method= "POST" enctype="multipart/form-data" action='/ingest'>
            <p><input type="file" name="jsonFile"></p>
            <p><input type="submit" value="Submit"></p>
        </form>
    </div>
</div>

{% endblock %}
