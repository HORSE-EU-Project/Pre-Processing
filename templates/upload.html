{% extends "base.html" %}
{% block title %} Oauth2 IDM Demo. {% endblock %}

{% block content %}
<style>
    .vertical-menu {
  width: 200px;
  border-radius: 200px;
}

.vertical-menu a {
  background-color: #eee;
  color: black;
  display: block;
  padding: 12px;
  text-decoration: none;
}

.vertical-menu a:hover {
  background-color: #ccc;
}

.vertical-menu a.active {
  background-color: #025573;

  color: white;
}
</style>
<body>

    <div class="content">
        <div class="content-inside">

            <div class="row" style="padding:5%">

                <div class="column" style="width:20%;">

                    <div class=" vertical-menu ">
                    
                        <button type="button" class="btn btn-info btn-lg" data-toggle="modal" data-target="#myModal" style="background-color:white; color: #025573; border-width: 1px; border-color: #025573; margin-bottom: 2%;">Give me my token!</button>

                        <div class="modal fade" id="myModal" role="dialog">
                            <div class="modal-dialog">

                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h4 class="modal-title">This is your token!</h4>
                                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                                    </div>
                                    <div class="modal-body">
                                        <div>
                                            <input id="password2" type="password" class="form-control" name="password" value= {{tkn}}>
                                            <small>Copy it!</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <a class="active" href="/upload">Upload Data</a>
                        <a class=""       href="/user_history">History Upload</a>
                        <a class=""       href="/subscribe">Subscribe</a>

                    </div>
                </div>

                <div class="column " style="width: 80%;">
                    <h3 style="text-align:center;">Upload a JSON file</h3>

                        <div style="padding:5%;">
                            <form class="form-inline" style="justify-content: center;" method= "POST" enctype="multipart/form-data" action='/upload'>
                                <p><input type="file" name="jsonFile"></p>
                                <textarea id="description" name="description" placeholder="Write your description.." style="width:250px; height:50px; margin-right:30px;"></textarea>
                                <p><input type="submit" value="Submit" onclick=PostJsonOrion()></p>
                            </form>

                        </div>    
                </div>
            </div>
        </div>

      </div>
    <footer>
        {% include "./footer.html" %}    
    </footer>
    
</body>
{% endblock %}
