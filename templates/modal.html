{% extends "base.html" %}
{% block title %} Oauth2 IDM Demo. {% endblock %}

{% block content %}
<head>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>

    <div class="container">
      
        <!-- Modal -->
        <div id="myModal" class="modal hide fade in" data-keyboard="false" data-backdrop="static">
          <div class="modal-dialog">
          
            <!-- Modal content-->
            <div class="modal-content">
              <div class="modal-header">
                <h4 class="modal-title" style="text-align: center;">Provider form</h4>
              </div>
              <div class="modal-body">
                  <form  method= "POST" enctype="multipart/form-data" action="/push_app_org">
                    <div class="form-group">
                        <label for="org">Organization</label>
                        <select id="org" name="org" required>
                            <option value="" disabled selected hidden>Choose organization</option>
                            <option value="org1">organization1</option>
                            <option value="org2">organization2</option>
                            <option value="org3">organization3</option>
                            <option value="org4">organization4</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="application">Application</label>
                        <input type="text" id="application" name="application" required><br><br>
                    </div>
                    <input type="submit" value="Submit">
                </form>
                  
                </select>
              </div>

            </div>
            
          </div>
        </div>
        
      </div>
    

      <script> $('#myModal').modal('show');</script>
  
      <body>

        <div class="content">
            <div class="content-inside ">
                <div class="row" style="padding:5%">
    
                    <div class="column" style="width:20%;">
    
                        <div class=" vertical-menu ">
                        
                            <button type="button" class="btn btn-info btn-lg" data-toggle="modal" data-target="#myModal" style="background-color:white; color: #025573; border-width: 1px; border-color: #025573; margin-bottom: 2%;">Give me my token!</button>
    
                            <div class="modal fade" id="myModal" role="dialog">
                                <div class="modal-dialog">
    
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h4 class="modal-title">This is your token!</h4>
                                            <button type="button" class="close" data-dismiss="modal">&times;</button>
                                        </div>
                                        <div class="modal-body form-inline">
                                             
                                                <input id="password2" type="password" class="form-control" name="password" value= {{tkn}}>
                                                <small>Copy it!</small>
                                             
                                        </div>
                                    </div>
                                </div>
                            </div>
    
                            <a class="" href="/upload"> Upload Data</a>
                            <a class="" href="/user_history"> History Upload</a>
                            <a class="" href="/subscribe"> Subscribe</a>
    
                        </div>
                    </div>
    
                    <div class="column" style="width: 80%;">
                        <div class="row" style="justify-content: center;">
                            <img src="../static/clapping.png" style="object-fit:cover; height:50px;">
                            <h1>Welcome, {{name}}!</h1>
                        </div>
                        <p style="text-align: center;">DFF is the No1 Web app for secure Data exchange</p>
    
                    </div>
    
                </div>
            </div>
        </div>
    
        <footer>
        {% include "./footer.html" %}    
        </footer>
    
    </body>
{% endblock %}
