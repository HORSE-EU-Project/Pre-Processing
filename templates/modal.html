{% extends "base.html" %}
{% block title %} Oauth2 IDM Demo. {% endblock %}

{% block content %}
<head>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>

    <div class="container">
      
        <!-- Modal -->
        <div id="myModal" class="modal hide fade in" data-keyboard="false" data-backdrop="static">
          <div class="modal-dialog">
          
            <!-- Modal content-->
            <div class="modal-content">
              <div class="modal-header">
                <h4 class="modal-title" style="text-align: center;">Provider form</h4>
              </div>
              <div class="modal-body">
                  <form  method= "POST" enctype="multipart/form-data" action="/profile/store_user_profile">
                    <div class="form-group">
                        <label style="width: 110px;" for="org">Organization</label>
                        <select id="org" name="org" required>
                            <option value="" disabled selected hidden>Choose organization</option>
                            <option value="org1">8BELLS</option>
                            <option value="org2">PROBO</option>
                            <option value="org3">PRO</option>
                            <option value="org4">VICOM</option>
                            <option value="org5">VPF</option>
                            <option value="org6">ATM</option>
                            <option value="org7">ROB</option>
                            <option value="org8">CLS</option>
                            <option value="org9">IANUS</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label style="width: 110px;" for="domain_name">Domain name</label>
                        <input id="domain_name" name="domain_name" placeholder="example.com"><br><br>
                    </div>

                    <div class="form-group">


                        <INPUT type="button" value="Add Application" onclick="addRow('dataTable')" />  
                        {% if message %}
                            <p style="color:red;">{{message}} </p>
                        {% endif %}
                        <TABLE id="dataTable" width="350px">  
                            <TR>  
                                <TD ><input type="button" name="button1" value="Delete" onclick="removeRow(this)"></TD>  
                                
                                <TD><input type="text" value="" name="app1"></TD>  
                            </TR>  
                        </TABLE>  
                        
                        <SCRIPT language="javascript">  
                            function addRow(tableID) {  
                                var table = document.getElementById(tableID);  
                                var rowCount = table.rows.length;  
                                var row = table.insertRow(rowCount);  
                                //Column 1  
                                var cell1 = row.insertCell(0);  
                                var element1 = document.createElement("input");  
                                element1.type = "button";  
                                var btnName = "button" + (rowCount + 1);  
                                element1.name = btnName;  
                                element1.setAttribute('value', 'Delete'); // or element1.value = "button";  
                                element1.onclick = function () { removeRow(this); }  
                                cell1.appendChild(element1);  

                                //Column 3  
                                var cell2 = row.insertCell(1);  
                                var element2 = document.createElement("input");
                                element2.type = "text";  
                                element2.name = "app"+ (rowCount + 1);  
                                cell2.appendChild(element2);  
                            }  
                            function removeRow(ele) {  
                                btnName=ele.name;
                                try {  
                                    var table = document.getElementById('dataTable');  
                                    var rowCount = table.rows.length;  

                                    for (var i = 0; i < rowCount; i++) {  
                                        var row = table.rows[i];  
                                        var rowObj = row.cells[0].childNodes[0];  
                                        if (rowObj.name == btnName) {  
                                            table.deleteRow(i);  
                                            rowCount--;  
                                        }  
                                    }
                                    
                                    for (var i = 0; i < rowCount; i++) {  
                                        var row = table.rows[i];  
                                        var rowObj = row.cells[0].childNodes[0];
                                        var rowObj2 = row.cells[1].childNodes[0];  
                                        rowObj.name="button"+ (i + 1);
                                        rowObj2.name="app"+ (i + 1);

                                    } 
                                }  
                                catch (e) {  
                                    alert(e);  
                                }  
                            }  
                    </SCRIPT>

                    </div>
                    

                    <input type="submit" value="Submit">
                </form>
                  
                </select>
              </div>

            </div>
            
          </div>
        </div>
        
      </div>
    

      <script> $('#myModal').modal('show');</script>
  
      <body>

        <div class="content">
            <div class="content-inside ">
                <div class="row" style="padding:5%">
    
                    <div class="column" style="width: 90%;">
                        <div class="row" style="justify-content: center;">
                            <img src="../static/clapping.png" style="object-fit:cover; height:50px;">
                            <h1>Welcome, {{name}}!</h1>
                        </div>
                        <p style="text-align: center;">DFF is the No1 Web app for secure Data exchange</p>
    
                    </div>
    
                </div>
            </div>
        </div>
    
    </body>
{% endblock %}
