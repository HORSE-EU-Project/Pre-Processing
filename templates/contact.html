{% extends "base.html" %}
{% block title %} Contact Us - Oauth2 IDM Demo {% endblock %}

{% block content %}
<head>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
</head>
<style>
  @media(max-width: 800px) {
    .row {
      width: 70%!important;
    }
    .column {
      font-size: auto;
      width: 100%!important;
    }
  }
</style>
<body>
  <div class="content">
    <div class="content-inside">
      <h1 style="color:black;text-align: center;margin-top: 2%;"><strong>Contact Us</strong></h1>
      <div class="row" style="border-radius:20px;display: flex; margin-bottom: 5%; margin: 5%; box-shadow: 1px 5px 20px #888888; margin-top: 2%; margin-left: auto; margin-right: auto; width:70%;">
        <div class="column" style="border-radius: 20px 0px 0px 20px;width: 50%;padding: 20px; background-image: url('../static/back.jpg');">
          <h2 style="color:black;text-align: center; color:white;">Get in Touch</h2>
          <p style="color:white;">
            <img src="../static/check.png" style="width:18px;height:18px;">  We value your feedback
          </p>
          <p style="color:white;">
            <img src="../static/check.png" style="width:18px;height:18px;">  Reach out for queries or suggestions
          </p>
        </div>
        <div class="column" style="border-radius: 0px 20px 20px 0px;width: 50%;padding: 20px;">
          <h2 style="color:black;text-align: center;">Contact Form</h2>
          <form method="post">
            {% if m in error_message %}
            <p>{{m}}</p>
            {% endif %}
            <div class="form-group">
              <label for="name">Name:</label>
              <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="form-group">
              <label for="email">Email:</label>
              <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="form-group">
              <label for="message">Message:</label>
              <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
            </div>
            <center><button type="submit" style="background-color: #025573;" class="btn btn-primary">Submit</button></center>
          </form>
        </div>
      </div>  
    </div>
  </div>
</body>
{% endblock %}
