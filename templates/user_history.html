{% extends "base.html" %}
{% block title %} Main Screen {% endblock %}

{% block content %}

<style>
    .vertical-menu {
        width: 200px;
        border-radius: 200px;
    }

    .vertical-menu a {
        background-color: #eee;
        color: black;
        display: block;
        padding: 12px;
        text-decoration: none;
    }

    .vertical-menu a:hover {
        background-color: #ccc;
    }

    .vertical-menu a.active {
        background-color: #025573;

        color: white;
    }

    th, td {
  padding: 15px;
  text-align: left;
}

thead,
tfoot {
    background-color: #025573;
    color: #fff;
}
tr:nth-child(odd){
    background:rgba(2,85, 115,0.3);}

tr:nth-child(even){
    background:#f5f5f5;}

.dataframe{
    margin:0 auto;
}
</style>

<body>

    <div class="content">
        <div class="content-inside ">
            <div class="row" style="padding:5%">

                <div class="column" style="width:20%;">

                    <div class=" vertical-menu ">
                    
                        <button type="button" class="btn btn-info btn-lg" data-toggle="modal" data-target="#myModal" style="background-color:white; color: #025573; border-width: 1px; border-color: #025573; margin-bottom: 2%;"> <img src="./static/coin.png" style="height: 25px;">&nbsp;Give me token!</button>

                        <div class="modal fade" id="myModal" role="dialog">
                            <div class="modal-dialog">

                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h4 class="modal-title">This is your token!</h4>
                                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                                    </div>
                                    <div class="modal-body">
                                        <div>
                                            <input id="password2" type="password" class="form-control" name="password" value= {{tkn}}>
                                            <small>Copy it!</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <a class="" href="/upload">Upload Data</a>
                        <a class="active"       href="/user_history">History Upload</a>
                        <a class=""       href="/subscribe">Subscribe</a>

                    </div>
                </div>
            
                <div class="column" style="width: 80%; margin: 0 auto;">
                    <h3 style="text-align:center;">This is your upload history</h3>
                    
                    {{data | safe}}
                    
                    
                </div>
            </div>
        </div>
    </div>
    <footer>
        {% include "./footer.html" %}
    </footer>
        

</body>

{% endblock %}
