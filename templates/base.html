<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

    <!-- Include the Vertical Menu -->
    {% include 'vertical_menu.html' %}

    <!-- Navigation Menu -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a href="/"><img src="{{ url_for('static', filename='images/logo.png') }}" style="object-fit:cover; height:50px;"></a>
        <button type="button" class="navbar-toggler" data-toggle="collapse" data-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="navbarCollapse" class="collapse navbar-collapse justify-content-start" style="font-weight: 600; font-size: 18px;">
            <div class="navbar-nav">
                <a href="/" class="nav-item nav-link">Home</a>
                <a href="{{ url_for('about') }}" class="nav-item nav-link">About</a>
                <a href="{{ url_for('contact.submit_contact') }}" class="nav-item nav-link">Contact</a>
            </div>
            <div class="navbar-nav action-buttons ml-auto" style="margin-right: 50px;">
                <div class="dropdown">
                    <button class="dropbtn">
                        <img src="{{ url_for('static', filename='images/user.png') }}" style="height:25px;">  {{name}}
                    </button>
                    <div class="dropdown-content">
                        <a href="/profile" class="nav-item nav-link">Profile</a>
                        <a class="nav-item nav-link" style="color:red;" href="/logout">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Flash Messages -->
    {% for message in get_flashed_messages(with_categories=True) %}
        <div class="alert alert-{{ message[0] }} alert-dismissible" role="alert">
            <button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            {{ message[1] }}
        </div>
    {% endfor %}

    <!-- Main Content Block -->
    {% block content %}{% endblock %}

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="{{ url_for('static', filename='js/form-stuff.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery-peeper.js') }}"></script>
    <script>
        $(function(){
            $("#password2").peeper({
                mask: false,
                showPasswordBtn: false
            });
        });
    </script>
</body>
</html>
