{% extends "base.html" %}
{% block title %} Main Screen {% endblock %}

{% block content %}

<p><h1 style="color:green;text-align:center;">Hello, {{name}}! You're logged in! Email: {{email}}</h1></p>

<div class="row margin-bottom-10"></div>
    <div class="text-center">
        <form action=/register method= "POST" enctype="multipart/form-data" >
            <!--<p><input type="submit" name="RegisterButton" value="Register"></p>-->
            <style>
                .show-onclick { display: none; }
            </style>
            <div class="show-onclick form-group col-xl-3">
                <label class="control-label">This is your token.</label>
                <div>
                    <input id="password2" type="password" class="form-control" name="password" value={{token}}>
                    <small>Copy it!</small>
                </div>
            </div>
            <button type="button" class="btn btn-outline-primary" id="showToken">Give me my token</button>
            <!-- <a class="btn btn-outline-primary" role="button" data-bs-toggle="button" onclick='window.location.href="/register"' data-arg1={{token}}>Get token</a> -->
        </form>

        <form action=/consume method= "POST" enctype="multipart/form-data" >
            <!--<p><input type="submit" name="ConsumeButton"  value="Consume"></p>-->
            <a class="btn btn-outline-primary" role="button" data-bs-toggle="button" onclick='window.location.href="/consumer"'>Consumer</a>
        </form>

        <a class="btn btn-primary" role="button" data-bs-toggle="button" onclick='window.location.href="/logout"'>Logout</a>
    </div>
</div>

<script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
<script> 
    $(document).ready(function() {
        $('#showToken').click(function() {
            $('.show-onclick').show();
        });
    });
</script>
{% endblock %}
