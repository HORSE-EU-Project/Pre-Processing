{% extends "base.html" %}
{% block title %} Main Screen {% endblock %}

{% block content %}

<p><h1 style="color:green;text-align:center;">Hello, {{name}}! You're logged in! Email: {{email}}</h1></p>

<div class="container">
    <!-- Trigger the modal with a button -->
    <button type="button" class="btn btn-info btn-lg" data-toggle="modal" data-target="#myModal">Give me my token!</button>
  
    <!-- Modal -->
    <div class="modal fade" id="myModal" role="dialog">
        <div class="modal-dialog">
            <!-- Modal content-->
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">This is your token!</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div>
                        <input id="password2" type="password" class="form-control" name="password" value= {{tkn}}>
                        <small>Copy it!</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <form action=/consume method= "POST" enctype="multipart/form-data" >
        <a class="btn btn-info btn-lg" role="button" data-bs-toggle="button" onclick='window.location.href="/subscribe"'>Make a subscription</a>
    </form>

    <a class="btn btn-primary" role="button" data-bs-toggle="button" onclick='window.location.href="/logout"'>Logout</a>
</div>

<script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
<script> 
    $(document).ready(function() {
        $('#showToken').click(function() {
            $('.show-onclick').show({tkn});
        });
    });
</script>
{% endblock %}
