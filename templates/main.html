{% extends "base.html" %}
{% block title %} Main Screen {% endblock %}
{% block content %}

<head>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<style>
    @media(max-width: 800px) {

.column {
  font-size:auto;
  width: 100%!important;
  display: block;
text-align: center;
}
}
</style>
<body>

    <div class="content">
        <div class="content-inside ">
            <div class="row" style="padding:5%">

                <div class="column" style="width:20%;">

                    <div class=" vertical-menu ">
                    
                        <button type="button" class="btn btn-info btn-lg" data-toggle="modal" data-target="#myModal" style="background-color:white; color: #025573; border-width: 1px; border-color: #025573; margin-bottom: 2%;">Give me my token!</button>

                        <div class="modal fade" id="myModal" role="dialog">
                            <div class="modal-dialog">

                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h4 class="modal-title">This is your token!</h4>
                                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                                    </div>
                                    <div class="modal-body form-inline">
                                         
                                            <input id="password2" type="password" class="form-control" name="password" value= {{tkn}}>
                                            <small>Copy it!</small>
                                         
                                    </div>
                                </div>
                            </div>
                        </div>

                        <a class="" href="/upload"> Upload Data</a>
                        <a class="" href="/user_history"> History Upload</a>
                        <a class="" href="/subscribe"> Subscribe</a>

                    </div>
                </div>

                <div class="column" style="width: 80%;">
                    <div class="row" style="justify-content: center;">
                        <img src="../static/clapping.png" style="object-fit:cover; height:50px;">
                        <h1>Welcome, {{name}}!</h1>
                    </div>
                    <p style="text-align: center;">DFF is the No1 Web app for secure Data exchange</p>

                </div>

            </div>
        </div>
    </div>

    <footer>
    {% include "./footer.html" %}    
    </footer>

</body>


{% endblock %}
