{% extends "base.html" %}
{% block title %} Results from QuantumLeap {% endblock %}

{% block content %}

<h1 style="color:green;text-align:center;">Results of the example web request to Fiware's QuantumLeap</h1>
<div id="chart" class="chart"></div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script type="text/javascript">
    var graphs = {{ graphJSON | safe }};
    Plotly.plot("chart",graphs,{});
</script>

<div class="row margin-bottom-10">
    <div class="text-center">
        <button class="btn btn-primary" role="button" data-bs-toggle="button" onclick='window.location.href="/consumer"'>Make Another Request</button>
    </div>
</div>

{% endblock %}
